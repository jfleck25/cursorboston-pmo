<!DOCTYPE html>

<style>
        .cyber-glow { box-shadow: 0 0 12px rgba(0, 255, 102, 0.4); }
        .cyber-glow:hover { box-shadow: 0 0 20px rgba(0, 255, 102, 0.6); }
        .cyber-border-active { border-color: #00eefc; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Layer (The Assembly Line) -->
<div class="absolute inset-0 z-0 opacity-50 blur-sm pointer-events-none">
<div class="p-gutter max-w-container-max mx-auto grid grid-cols-4 gap-gutter h-full">
<div class="col-span-1 border-r border-surface-variant flex flex-col gap-4 pr-gutter mt-20">
<div class="h-20 bg-surface-container rounded border border-surface-variant"></div>
<div class="h-32 bg-surface-container rounded border border-surface-variant"></div>
</div>
<div class="col-span-3 flex flex-col gap-4 mt-20">
<div class="h-10 w-full bg-surface-container rounded border border-surface-variant"></div>
<div class="grid grid-cols-3 gap-gutter h-full">
<div class="bg-surface-container rounded border border-surface-variant h-full"></div>
<div class="bg-surface-container rounded border border-surface-variant h-full"></div>
<div class="bg-surface-container rounded border border-surface-variant h-full"></div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 z-10 bg-surface/80 backdrop-blur-md flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Slot Machine Container -->
<div class="bg-[#1A1D23]/90 border border-surface-variant rounded-lg w-full max-w-[960px] flex flex-col overflow-hidden shadow-2xl relative">
<!-- Top App Bar Replacement for Focused View -->
<header class="flex items-center justify-between border-b border-surface-variant px-6 py-4 bg-surface-container-highest/50">
<button aria-label="Go Back" class="flex items-center justify-center size-10 rounded text-on-surface-variant hover:text-primary-container hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">casino</span>
<span class="font-data-md text-primary-container tracking-widest uppercase">Task Generator</span>
</div>
<div class="size-10"></div> <!-- Spacer for balance -->
</header>
<div class="flex flex-col p-6 md:p-8 flex-grow gap-8">
<!-- Header -->
<div class="text-center flex flex-col gap-2">
<h1 class="font-headline-lg text-on-background">What are we shipping this week?</h1>
<p class="font-data-lg text-secondary-container">Theme: Week 2: Comms</p>
</div>
<!-- The Reels -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-gutter relative">
<!-- Selection Indicator Line (Horizontal middle line across all reels) -->
<div class="hidden md:block absolute top-1/2 left-0 right-0 h-px bg-primary-container/50 z-20 pointer-events-none transform -translate-y-1/2 shadow-[0_0_8px_rgba(0,255,102,0.8)]"></div>
<!-- Selection Highlights (Boxes inside reels) -->
<div class="hidden md:block absolute top-1/2 left-0 w-[calc(33.333%-10.66px)] h-32 border-2 border-primary-container rounded pointer-events-none transform -translate-y-1/2 z-20 mx-2"></div>
<div class="hidden md:block absolute top-1/2 left-[calc(33.333%+5.33px)] w-[calc(33.333%-10.66px)] h-32 border-2 border-primary-container rounded pointer-events-none transform -translate-y-1/2 z-20 mx-2"></div>
<div class="hidden md:block absolute top-1/2 right-0 w-[calc(33.333%-10.66px)] h-32 border-2 border-primary-container rounded pointer-events-none transform -translate-y-1/2 z-20 mx-2"></div>
<!-- Reel 1: Source -->
<div class="flex flex-col bg-surface-container-low border border-surface-variant rounded h-[400px] overflow-hidden relative group">
<div class="absolute top-0 inset-x-0 h-8 bg-surface-container-high border-b border-surface-variant flex items-center justify-center z-10">
<span class="font-label-caps text-on-surface-variant">SOURCE</span>
</div>
<div class="absolute top-8 inset-x-0 h-16 bg-gradient-to-b from-surface-container-low to-transparent z-10 pointer-events-none"></div>
<div class="absolute bottom-0 inset-x-0 h-16 bg-gradient-to-t from-surface-container-low to-transparent z-10 pointer-events-none"></div>
<!-- Reel Content (Simulated Scroll) -->
<div class="flex flex-col gap-4 px-4 py-32 h-full justify-center transform group-hover:-translate-y-4 transition-transform duration-700 ease-in-out">
<div class="h-24 bg-surface flex items-center justify-center border border-surface-variant rounded opacity-40">
<span class="font-data-md text-on-surface-variant text-center">Refactor</span>
</div>
<!-- Active Slot -->
<div class="h-32 bg-surface-container flex items-center justify-center border border-surface-variant rounded flex-col gap-2 p-4">
<span class="material-symbols-outlined text-3xl text-secondary-container" style="font-variation-settings: 'FILL' 0;">smart_toy</span>
<span class="font-data-md text-on-background text-center">AI Idea</span>
</div>
<div class="h-24 bg-surface flex items-center justify-center border border-surface-variant rounded opacity-40">
<span class="font-data-md text-on-surface-variant text-center">Bug Squash</span>
</div>
<div class="h-24 bg-surface flex items-center justify-center border border-surface-variant rounded opacity-40 hidden">
<span class="font-data-md text-on-surface-variant text-center">GitHub Issue</span>
</div>
</div>
</div>
<!-- Reel 2: Tech/Scope -->
<div class="flex flex-col bg-surface-container-low border border-surface-variant rounded h-[400px] overflow-hidden relative group">
<div class="absolute top-0 inset-x-0 h-8 bg-surface-container-high border-b border-surface-variant flex items-center justify-center z-10">
<span class="font-label-caps text-on-surface-variant">TECH / SCOPE</span>
</div>
<div class="absolute top-8 inset-x-0 h-16 bg-gradient-to-b from-surface-container-low to-transparent z-10 pointer-events-none"></div>
<div class="absolute bottom-0 inset-x-0 h-16 bg-gradient-to-t from-surface-container-low to-transparent z-10 pointer-events-none"></div>
<!-- Reel Content (Simulated Scroll) -->
<div class="flex flex-col gap-4 px-4 py-32 h-full justify-center transform group-hover:-translate-y-8 transition-transform duration-1000 ease-in-out delay-75">
<div class="h-24 bg-surface flex items-center justify-center border border-surface-variant rounded opacity-40">
<span class="font-data-md text-on-surface-variant text-center">Documentation</span>
</div>
<!-- Active Slot -->
<div class="h-32 bg-surface-container flex items-center justify-center border border-surface-variant rounded flex-col gap-2 p-4">
<span class="material-symbols-outlined text-3xl text-secondary-container" style="font-variation-settings: 'FILL' 0;">terminal</span>
<span class="font-data-md text-on-background text-center">Python Script</span>
</div>
<div class="h-24 bg-surface flex items-center justify-center border border-surface-variant rounded opacity-40">
<span class="font-data-md text-on-surface-variant text-center">Landing Page</span>
</div>
</div>
</div>
<!-- Reel 3: Output -->
<div class="flex flex-col bg-surface-container-low border border-surface-variant rounded h-[400px] overflow-hidden relative group">
<div class="absolute top-0 inset-x-0 h-8 bg-surface-container-high border-b border-surface-variant flex items-center justify-center z-10">
<span class="font-label-caps text-on-surface-variant">OUTPUT</span>
</div>
<div class="absolute top-8 inset-x-0 h-16 bg-gradient-to-b from-surface-container-low to-transparent z-10 pointer-events-none"></div>
<div class="absolute bottom-0 inset-x-0 h-16 bg-gradient-to-t from-surface-container-low to-transparent z-10 pointer-events-none"></div>
<!-- Reel Content (Simulated Scroll) -->
<div class="flex flex-col gap-4 px-4 py-32 h-full justify-center transform group-hover:-translate-y-6 transition-transform duration-500 ease-in-out delay-150">
<div class="h-24 bg-surface flex items-center justify-center border border-surface-variant rounded opacity-40">
<span class="font-data-md text-on-surface-variant text-center px-2">Tailwind Theme</span>
</div>
<!-- Active Slot -->
<div class="h-32 bg-surface-container flex items-center justify-center border border-surface-variant rounded flex-col gap-2 p-4">
<span class="material-symbols-outlined text-3xl text-secondary-container" style="font-variation-settings: 'FILL' 0;">api</span>
<span class="font-data-md text-on-background text-center px-2 leading-tight">Fast API Backend Component</span>
</div>
<div class="h-24 bg-surface flex items-center justify-center border border-surface-variant rounded opacity-40">
<span class="font-data-md text-on-surface-variant text-center px-2">React Component</span>
</div>
</div>
</div>
</div>
<!-- The Lever / Spin Action -->
<div class="flex justify-center mt-4">
<button class="bg-primary-container text-surface flex flex-col items-center justify-center rounded-lg h-24 px-12 md:px-24 w-full md:w-auto font-headline-xl uppercase tracking-widest cyber-glow transition-all hover:bg-primary-fixed hover:scale-[1.02] active:scale-[0.98] border-b-4 border-inverse-primary relative overflow-hidden group">
<!-- Implied skeuomorphic texture/glint -->
<div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent pointer-events-none"></div>
<span class="relative z-10 flex items-center gap-4">
                            SPIN
                            <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">autorenew</span>
</span>
<span class="font-label-caps text-on-primary-container opacity-80 mt-1 relative z-10">10 Credits</span>
</button>
</div>
</div>
</div>
</div>
